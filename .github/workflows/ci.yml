name: CI

# Runs on pull requests only — pushes to main are handled by release.yml
on:
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config \
            libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev \
            libgl1-mesa-dev libxxf86vm-dev libayatana-appindicator3-dev \
            libdbus-1-dev

      - name: Build and verify
        run: |
          go mod tidy
          go vet ./...
          go test ./...
          go build -ldflags "-s -w" -o linboard ./cmd/linboard
          ./linboard version
          ./linboard help | head -1
