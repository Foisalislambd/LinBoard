name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.26.x'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goarch: amd64
            asset: linboard-linux-amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            goarch: arm64
            asset: linboard-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config \
            libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev \
            libgl1-mesa-dev libxxf86vm-dev libayatana-appindicator3-dev \
            libdbus-1-dev

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version $TAG for ${{ matrix.name }}"

      - name: Build binary
        env:
          CGO_ENABLED: '1'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go mod tidy
          go vet ./...
          LDFLAGS="-s -w -X github.com/foisal/linboard/internal/config.AppVersion=${{ steps.version.outputs.tag }}"
          go build -ldflags "$LDFLAGS" -o linboard ./cmd/linboard
          ./linboard version

      - name: Package release archive
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          ASSET="${{ matrix.asset }}"
          PKG="dist/${ASSET}"
          mkdir -p "$PKG"
          cp linboard "$PKG/"
          cp scripts/package/install.sh "$PKG/install.sh"
          cp install/linboard.desktop "$PKG/linboard.desktop"
          cp scripts/package/QUICKSTART.txt "$PKG/QUICKSTART.txt"
          chmod +x "$PKG/install.sh" "$PKG/linboard"
          tar -czf "dist/${ASSET}-v${VERSION}.tar.gz" -C "$PKG" .
          (cd dist && sha256sum "${ASSET}-v${VERSION}.tar.gz" > "${ASSET}-v${VERSION}.tar.gz.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}-v${{ steps.version.outputs.tag }}.tar.gz*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List packages
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
