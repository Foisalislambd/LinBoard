name: Release

# Auto-release on push to main: version bump → build → tag → GitHub Release
# Skip with [skip release] in the commit message
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.x'

jobs:
  version:
    name: Plan version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          if echo "$COMMIT_MSG" | grep -qi '\[skip release\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "Skipped — [skip release] in commit message"
            exit 0
          fi

          if EXISTING=$(git describe --exact-match --tags HEAD 2>/dev/null); then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "tag=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "version=${EXISTING#v}" >> "$GITHUB_OUTPUT"
            echo "Commit already tagged as $EXISTING — skipping"
            exit 0
          fi

          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            TAG="v1.0.0"
          else
            VER="${LATEST#v}"
            MAJOR="${VER%%.*}"
            REST="${VER#*.}"
            MINOR="${REST%%.*}"
            PATCH="${REST##*.}"
            PATCH=$((PATCH + 1))
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Next release: $TAG"

  build:
    name: Build ${{ matrix.name }}
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goarch: amd64
            asset: linboard-linux-amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            goarch: arm64
            asset: linboard-linux-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config \
            libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev \
            libgl1-mesa-dev libxxf86vm-dev libayatana-appindicator3-dev \
            libdbus-1-dev

      - name: Build binary
        env:
          CGO_ENABLED: '1'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Building version $VERSION for ${{ matrix.name }}"
          go mod tidy
          go vet ./...
          LDFLAGS="-s -w -X github.com/foisal/linboard/internal/config.AppVersion=${VERSION}"
          go build -ldflags "$LDFLAGS" -o linboard ./cmd/linboard
          file linboard
          ls -lh linboard

      - name: Package release archive
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          ASSET="${{ matrix.asset }}"
          PKG="dist/${ASSET}"
          mkdir -p "$PKG"
          cp linboard "$PKG/"
          cp scripts/package/install.sh "$PKG/install.sh"
          mkdir -p "$PKG/lib"
          cp scripts/lib/system-setup.sh "$PKG/lib/system-setup.sh"
          cp install/linboard.desktop "$PKG/linboard.desktop"
          cp scripts/package/QUICKSTART.txt "$PKG/QUICKSTART.txt"
          chmod +x "$PKG/install.sh" "$PKG/linboard"
          tar -czf "dist/${ASSET}-v${VERSION}.tar.gz" -C "$PKG" .
          (cd dist && sha256sum "${ASSET}-v${VERSION}.tar.gz" > "${ASSET}-v${VERSION}.tar.gz.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}-v${{ needs.version.outputs.version }}.tar.gz*

  release:
    name: Tag & publish release
    needs: [version, build]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List packages
        run: find dist -type f | sort

      - name: Generate release description
        env:
          VERSION: ${{ needs.version.outputs.version }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          sed -e "s/@VERSION@/${VERSION}/g" -e "s/@TAG@/${TAG}/g" \
            .github/release-notes.md > /tmp/release-body.md
          echo "" >> /tmp/release-body.md
          echo "---" >> /tmp/release-body.md
          echo "" >> /tmp/release-body.md
          echo "## What's changed" >> /tmp/release-body.md
          PREV=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "$PREV" ]; then
            echo "Compare: [\`${PREV}...${TAG}\`](https://github.com/${{ github.repository }}/compare/${PREV}...${TAG})" >> /tmp/release-body.md
          fi
          git log --oneline --pretty=format:'- %s (%h)' -20 >> /tmp/release-body.md

      - name: Create and push tag
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — reusing for release upload"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: LinBoard ${{ needs.version.outputs.tag }}
          body_path: /tmp/release-body.md
          files: |
            dist/**/*.tar.gz
            dist/**/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
